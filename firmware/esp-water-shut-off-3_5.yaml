# =============================================================================
# BUTTONS — One-shot actions
#
# All reset actions are buttons (not switches) — they are stateless one-shot
# events. Buttons appear in HA as momentary push buttons, not toggles.
#
# SAFETY FAULT RESETS
#   Require deliberate acknowledgement. Verify the cause has been resolved
#   before resetting. Valve open is blocked until fault is cleared.
#
#   IMPORTANT: If the fault was caused by a failed close (closed end stop
#   not reached), resetting the fault alone is NOT enough — you must also
#   open the valve afterward to clear the close-in-flight guard. See the
#   CLOSE-IN-FLIGHT GUARD GLOBALS comment near the top of this file for
#   the full recovery procedure.
#
# TRICKLE ALERT RESETS
#   Separate from safety faults. Resetting does not block the valve —
#   it clears the flag and restarts the elapsed timer. If auto-shutoff
#   closed the valve, re-open it manually after resetting the alert.
# =============================================================================
button:
  - platform: template
    name: "Reset Safety Fault - Main"
    web_server:
      sorting_group_id: group_main_status
      sorting_weight: 11
    icon: mdi:restore-alert
    on_press:
      - lambda: |-
          id(fault_main) = false;
          id(fault_reason_main_str) = "";
          id(fault_reason_main).publish_state("");
      - logger.log: "Main safety fault manually reset"

  - platform: template
    name: "Reset Safety Fault - Irrigation"
    web_server:
      sorting_group_id: group_irr_status
      sorting_weight: 11
    icon: mdi:restore-alert
    on_press:
      - lambda: |-
          id(fault_irrigation) = false;
          id(fault_reason_irr_str) = "";
          id(fault_reason_irr).publish_state("");
      - logger.log: "Irrigation safety fault manually reset"

  - platform: template
    name: "Reset Trickle Alert - Main"
    web_server:
      sorting_group_id: group_main_status
      sorting_weight: 12
    icon: mdi:water-check
    on_press:
      - lambda: |-
          id(trickle_alert_main) = false;
          id(trickle_elapsed_main) = 0.0f;
          ESP_LOGI("trickle", "Main trickle flow alert manually reset");

  - platform: template
