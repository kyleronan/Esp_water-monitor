  #     (filling a bath, irrigation zone start, dishwasher fill). Watch the
  #     "(Averaged)" pressure entity in HA over a few days to find a baseline.
  #   - Set well below the drop expected from a burst pipe — typically 15+
  #     PSI as the system attempts to maintain flow into a wide-open break.
  #   - Default 10 PSI is a reasonable starting point for a typical mains
  #     supply. Lower it (5-7 PSI) for sensitive detection if your system
  #     pressure is stable; raise it (15-20 PSI) if you see false trips on
