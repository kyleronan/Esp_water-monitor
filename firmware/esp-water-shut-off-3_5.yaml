  # ---------------------------------------------------------------------------
  # TRICKLE FLOW THRESHOLDS AND DURATION — Main circuit
  #
  # The alert fires when smoothed flow stays continuously within the band
  # defined by min and max thresholds for the full alert duration.
  #
  # Min threshold — lower edge of the trickle band. Flow below this is treated
  #   as no flow and the timer resets. Set just above your flow meter's noise
  #   floor at zero flow. Default: 0.1 L/min. Range: 0.05–5 L/min.
  #
  # Max threshold — upper edge of the trickle band. Flow above this is treated
  #   as intentional demand (shower, tap running, irrigation zone) and the timer
  #   resets. Set below the lowest single-fixture demand in normal use.
  #   Default: 3.0 L/min. Range: 0.5–15 L/min.
  #
  # Duration — minutes of uninterrupted in-band flow required to fire the alert.
  #   Set high enough to clear normal brief low-flow events such as a toilet
  #   cistern refilling (~1–2 min) without triggering. Default: 90 min.
  #   Range: 1–120 min.
  #
  # Example reference values:
  #   Running toilet (flapper leak):  ~0.1–1.5 L/min continuously
  #   Dripping tap:                   ~0.05–0.3 L/min (may be below meter range)
  #   Tap left barely open:           ~0.5–3.0 L/min
