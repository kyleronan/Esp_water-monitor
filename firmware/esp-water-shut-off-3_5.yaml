  # ---------------------------------------------------------------------------
  # TRICKLE FLOW AUTO-SHUTOFF — Main circuit
  #
  # When ON:  the main valve closes automatically when the trickle alert fires.
  #           After resetting the alert, the valve can be re-opened normally —
  #           no safety fault is raised, so no fault reset is needed.
  #
  # When OFF: the alert still fires and appears in HA (and can drive
  #           notifications/automations), but the valve is left open. Useful
  #           when you want to be notified but prefer to decide manually.
  #
  # The preference is backed by a restore_value global and persists across
  # reboots — set it once and it is remembered.
  # ---------------------------------------------------------------------------
  - platform: template
    name: "Trickle Flow Auto-Shutoff - Main"
