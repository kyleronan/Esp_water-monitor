# =============================================================================
# SWITCHES
# Includes: relay coil GPIO switches, leak test switches, trickle auto-shutoff
# =============================================================================

# ---------------------------------------------------------------------------
# RELAY COIL SWITCHES — Two-coil polarized bistable (latching) relays
#
# Relay type: two-coil, polarized, bistable
#
#   "Two-coil"   — separate SET and RESET coils; one drives the relay to its
#                  OPEN contact, the other drives it to its CLOSED contact.
#
#   "Polarized"  — each coil requires current in the correct direction.
#                  Reversing polarity or cross-energising both coils
#                  simultaneously can burn out the windings.
#
#   "Bistable"   — the relay holds its contact position mechanically with no
#                  continuous power until the opposite coil is pulsed.
#
# *** CRITICAL: Both coils must NEVER be energised at the same time. ***
# The valve action sequences enforce this with a mandatory inter-coil gap:
#   turn_off opposite coil → delay 20ms → turn_on drive coil → delay 15ms → turn_off
#
# Timing derived from TE RT424F12 datasheet:
#   Operate time (SET coil):   max 10ms
#   Reset time (RESET coil):   max  5ms
#   Inter-coil gap used:            20ms — 2x operate time
#   Coil pulse used:                15ms — satisfies both specs with margin
#
# No restore_mode set: GPIO state is irrelevant after a power cycle —
# the bistable relay stays latched in its last position regardless.
# ---------------------------------------------------------------------------
switch:
  - platform: gpio
    pin: GPIO48
    name: "Relay Open Valve 1"
    id: relay_open_valve1
    internal: true

  - platform: gpio
    pin: GPIO47
    name: "Relay Closed Valve 1"
    id: relay_closed_valve1
    internal: true

  - platform: gpio
    pin: GPIO14
    name: "Relay Open Valve 2"
    id: relay_open_valve2
    internal: true

  - platform: gpio
    pin: GPIO21
    name: "Relay Closed Valve 2"
    id: relay_closed_valve2
    internal: true

  # ---------------------------------------------------------------------------
  # MICRO LEAK TEST — Main circuit
  #
  # How to use:
  #   1. Ensure the main valve is OPEN and no fault is active.
  #   2. Enable this switch — the ESP closes the valve automatically, waits
  #      60 seconds for the pressure EMA to settle, then begins monitoring.
  #   3. When the test ends (pass, fail, or abort) the valve is automatically
  #      restored to open. If a safety fault fires during the test, the valve
  #      stays closed — the fault takes precedence.
  #   4. Disable the switch at any time to stop the test early and restore.
  #
  # The lambda shows ON during both the prepare and active phases.
  # ---------------------------------------------------------------------------
  - platform: template
    name: "Micro Leak Test - Main"
    web_server:
      sorting_group_id: group_main_status
      sorting_weight: 13
    icon: mdi:water-alert
    lambda: 'return id(leak_test_active_main) || id(leak_test_preparing_main);'
    turn_on_action:
      - script.execute: leak_test_run_main
    turn_off_action:
      - script.stop: leak_test_run_main
      - lambda: |-
          if (id(leak_test_active_main) || id(leak_test_preparing_main)) {
            id(leak_test_result_main) = 5;  // Stopped manually
          }
          id(leak_test_active_main) = false;
          id(leak_test_preparing_main) = false;
          id(leak_test_elapsed_main) = 0.0f;
          ESP_LOGI("leak_test", "Main leak test manually stopped.");
      - script.execute: leak_test_restore_main

  # ---------------------------------------------------------------------------
  # MICRO LEAK TEST — Irrigation circuit
  # Same as main — see main comments above for full usage instructions.
  # ---------------------------------------------------------------------------
  - platform: template
    name: "Micro Leak Test - Irrigation"
    web_server:
      sorting_group_id: group_irr_status
      sorting_weight: 13
    icon: mdi:water-alert
    lambda: 'return id(leak_test_active_irr) || id(leak_test_preparing_irr);'
    turn_on_action:
      - script.execute: leak_test_run_irr
    turn_off_action:
      - script.stop: leak_test_run_irr
      - lambda: |-
          if (id(leak_test_active_irr) || id(leak_test_preparing_irr)) {
            id(leak_test_result_irr) = 5;  // Stopped manually
          }
          id(leak_test_active_irr) = false;
          id(leak_test_preparing_irr) = false;
          id(leak_test_elapsed_irr) = 0.0f;
          ESP_LOGI("leak_test", "Irrigation leak test manually stopped.");
      - script.execute: leak_test_restore_irr

