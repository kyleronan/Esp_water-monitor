          id(trickle_alert_irr) = false;
          id(trickle_elapsed_irr) = 0.0f;
          ESP_LOGI("trickle", "Irrigation trickle flow alert manually reset");

# =============================================================================
# SCRIPTS — Leak test sequences
#
# Scripts are used for the leak test because they:
#   - Can be stopped mid-execution (script.stop cancels the settle delay cleanly)
#   - Run asynchronously so they don't block the sensor loop
#   - Can call valve actions (open/close) with the full action sequence
#
# Two scripts per circuit:
#   leak_test_run     — full test sequence (pre-checks, close, settle, monitor)
#   leak_test_restore — open valve if no fault is active; called by all outcomes
# =============================================================================
script:
  # ---------------------------------------------------------------------------
  # LEAK TEST RUN — Main circuit
  # Pre-checks valve state and fault, closes valve, waits 60s for EMA to settle,
  # then activates monitoring. If cancelled during settle, restore is called by
  # the turn_off_action which stops this script before calling restore.
  # ---------------------------------------------------------------------------
  - id: leak_test_run_main
    then:
      - if:
          condition:
            binary_sensor.is_on: closed_end_stop_valve1
          then:
            - lambda: |-
                id(leak_test_result_main) = 6;  // Not run — valve was closed
                ESP_LOGW("leak_test", "MAIN: test not started — valve is already closed. "
                  "Open the valve first so the line is pressurised.");
          else:
            - if:
                condition:
                  lambda: 'return !id(open_end_stop_valve1).state && !id(closed_end_stop_valve1).state;'
                then:
                  - lambda: |-
                      id(leak_test_result_main) = 6;  // Not run — valve mid-travel
                      ESP_LOGW("leak_test", "MAIN: test not started — valve is mid-travel "
                        "(neither end stop active). Wait for travel to complete.");
                else:
                  - if:
                      condition:
                        lambda: 'return id(fault_main);'
                      then:
                        - lambda: |-
                            id(leak_test_result_main) = 7;  // Not run — fault active
                            ESP_LOGW("leak_test", "MAIN: test not started — safety fault is active. "
                              "Reset the fault first.");
                      else:
                        # Pre-checks passed — begin sequence
                        - lambda: |-
                            id(leak_test_preparing_main) = true;
                            id(leak_test_result_main) = 8;  // Preparing
                            ESP_LOGI("leak_test", "MAIN: closing valve and waiting 60s for pressure to settle...");
                        - valve.close: main_water_valve
                        # 60-second settle — allows residual pressure dynamics
                        # (water hammer, thermal expansion, residual flow) to
                        # dissipate after the valve closes, so the baseline reading
                        # captured next is stable and noise-free.
                        - delay: 60s
                        # Guard: if cancelled during settle, preparing will be false
                        - lambda: |-
                            if (!id(leak_test_preparing_main)) return;
                            id(leak_test_preparing_main) = false;
                            id(leak_test_elapsed_main) = 0.0f;
                            id(leak_test_start_ms_main) = millis();
                            id(leak_test_baseline_main) = id(pressure_main).state;
                            id(leak_test_active_main) = true;
                            id(leak_test_result_main) = 1;  // In progress
                            ESP_LOGI("leak_test", "MAIN: test started. Baseline: %.1f PSI, "
                              "Threshold: %.1f PSI, Duration: %.0f min",
                              id(leak_test_baseline_main),
                              id(leak_threshold_psi_main).state,
                              id(leak_duration_main).state);

  # ---------------------------------------------------------------------------
  # LEAK TEST RESTORE — Main circuit
  # Opens the main valve if no safety fault is active. Called by every test
  # outcome — the fault guard ensures a concurrent high-flow fault (which closed
  # the valve for a real reason) is not overridden by the restore.
  # ---------------------------------------------------------------------------
  - id: leak_test_restore_main
    then:
      - if:
          condition:
            lambda: 'return !id(fault_main);'
          then:
            - valve.open: main_water_valve
            - logger.log:
                level: INFO
                tag: leak_test
                format: "MAIN: valve restored to open after leak test"

  # ---------------------------------------------------------------------------
  # LEAK TEST RUN — Irrigation circuit
  # Same sequence as main circuit.
  # ---------------------------------------------------------------------------
  - id: leak_test_run_irr
    then:
      - if:
          condition:
            binary_sensor.is_on: closed_end_stop_valve2
          then:
            - lambda: |-
                id(leak_test_result_irr) = 6;  // Not run — valve was closed
                ESP_LOGW("leak_test", "IRRIGATION: test not started — valve is already closed. "
                  "Open the valve first so the line is pressurised.");
          else:
            - if:
                condition:
                  lambda: 'return !id(open_end_stop_valve2).state && !id(closed_end_stop_valve2).state;'
                then:
                  - lambda: |-
                      id(leak_test_result_irr) = 6;  // Not run — valve mid-travel
                      ESP_LOGW("leak_test", "IRRIGATION: test not started — valve is mid-travel "
                        "(neither end stop active). Wait for travel to complete.");
                else:
                  - if:
                      condition:
                        lambda: 'return id(fault_irrigation);'
                      then:
                        - lambda: |-
                            id(leak_test_result_irr) = 7;  // Not run — fault active
                            ESP_LOGW("leak_test", "IRRIGATION: test not started — safety fault is active. "
                              "Reset the fault first.");
                      else:
                        - lambda: |-
                            id(leak_test_preparing_irr) = true;
                            id(leak_test_result_irr) = 8;  // Preparing
                            ESP_LOGI("leak_test", "IRRIGATION: closing valve and waiting 60s for pressure to settle...");
                        - valve.close: irrigation_water_valve
                        - delay: 60s
                        - lambda: |-
                            if (!id(leak_test_preparing_irr)) return;
                            id(leak_test_preparing_irr) = false;
                            id(leak_test_elapsed_irr) = 0.0f;
                            id(leak_test_start_ms_irr) = millis();
                            id(leak_test_baseline_irr) = id(pressure_irrigation).state;
                            id(leak_test_active_irr) = true;
                            id(leak_test_result_irr) = 1;  // In progress
                            ESP_LOGI("leak_test", "IRRIGATION: test started. Baseline: %.1f PSI, "
                              "Threshold: %.1f PSI, Duration: %.0f min",
                              id(leak_test_baseline_irr),
                              id(leak_threshold_psi_irr).state,
                              id(leak_duration_irr).state);

  # ---------------------------------------------------------------------------
  # LEAK TEST RESTORE — Irrigation circuit
  # ---------------------------------------------------------------------------
  - id: leak_test_restore_irr
    then:
      - if:
          condition:
            lambda: 'return !id(fault_irrigation);'
          then:
            - valve.open: irrigation_water_valve
            - logger.log:
                level: INFO
                tag: leak_test
                format: "IRRIGATION: valve restored to open after leak test"

# =============================================================================
# VALVES
# Template valves provide the Home Assistant valve entity for each circuit.
#
# State reporting (lambda):
#   - Returns OPEN if the open end stop is active (valve fully open)
#   - Returns CLOSED if the closed end stop is active (valve fully closed)
#   - Returns unknown {} if neither end stop is active (mid-travel or
#     position not yet confirmed after boot)
#
# Open action sequence:
#   1. Check fault flag — block open if fault active, log a warning
#   2. De-energise RESET (close) coil — ensures it is fully off
#   3. Wait 20ms — mandatory inter-coil gap (2x the RT424F12 max operate time)
#   4. Pulse SET coil 15ms then de-energise — relay latches, motor starts
#   5. Wait 15000ms — allow time for full valve travel
#      (increase if spurious end-stop-timeout faults occur at low temperature
#      or low supply voltage; decrease if your motor travels much faster)
#   6. Check open end stop — if not active, raise fault, publish CLOSED
#
# Close action (always permitted — safety action, no fault check):
#   Same sequence in reverse. Fault raised if closed end stop not reached.
#
# Relay coil timing (TE RT424F12):
#   SET operate time: max 10ms  |  RESET time: max 5ms
#   Pulse used: 15ms  |  Inter-coil gap: 20ms
# =============================================================================
valve:
  - platform: template
    name: "Main Water Valve"
    device_class: water
    web_server:
      sorting_group_id: group_main_status
      sorting_weight: 1
    id: main_water_valve
    lambda: |-
      if (id(open_end_stop_valve1).state) return VALVE_OPEN;
      if (id(closed_end_stop_valve1).state) return VALVE_CLOSED;
      return {};
    open_action:
      - if:
          condition:
            lambda: 'return id(fault_main);'
          then:
            - logger.log:
                level: WARN
                format: "Main valve open blocked — safety fault active. Reset fault first."
          else:
            - switch.turn_off: relay_closed_valve1
            - delay: 20ms
            - switch.turn_on: relay_open_valve1
            - delay: 15ms
            - switch.turn_off: relay_open_valve1
            - delay: 15000ms
            - if:
                condition:
                  binary_sensor.is_off: open_end_stop_valve1
                then:
                  - lambda: |-
                      id(fault_main) = true;
                      id(fault_reason_main_str) = "Motor fault — open end stop not reached";
                      id(fault_reason_main).publish_state(id(fault_reason_main_str));
                      ESP_LOGE("valve", "MAIN: open end stop not reached after 15000ms — motor/wiring fault");
                  - valve.template.publish:
                      id: main_water_valve
                      state: CLOSED
    close_action:
      # Guard against repeated valve.close calls while a close is already
      # in flight. The guard is set on first entry, cleared when the open
      # or closed end stop fires (see end stop on_press handlers above).
      # If a close fails (end stop never reached) the guard stays set —
      # opening the valve later clears it via the open end stop on_press.
      - if:
          condition:
            lambda: 'return id(close_in_flight_main);'
          then:
            - logger.log:
                level: DEBUG
                tag: valve
                format: "MAIN: close already in flight — ignoring duplicate request"
          else:
            - lambda: 'id(close_in_flight_main) = true;'
            - switch.turn_off: relay_open_valve1
            - delay: 20ms
            - switch.turn_on: relay_closed_valve1
            - delay: 15ms
            - switch.turn_off: relay_closed_valve1
            - delay: 15000ms
            - if:
                condition:
                  binary_sensor.is_off: closed_end_stop_valve1
                then:
                  - lambda: |-
                      id(fault_main) = true;
                      id(fault_reason_main_str) = "Motor fault — closed end stop not reached";
                      id(fault_reason_main).publish_state(id(fault_reason_main_str));
                      ESP_LOGE("valve", "MAIN: closed end stop not reached after 15000ms — motor/wiring fault");

  - platform: template
    name: "Irrigation Water Valve"
    device_class: water
    web_server:
      sorting_group_id: group_irr_status
      sorting_weight: 1
    id: irrigation_water_valve
    lambda: |-
      if (id(open_end_stop_valve2).state) return VALVE_OPEN;
      if (id(closed_end_stop_valve2).state) return VALVE_CLOSED;
      return {};
    open_action:
      - if:
          condition:
            lambda: 'return id(fault_irrigation);'
          then:
            - logger.log:
                level: WARN
                format: "Irrigation valve open blocked — safety fault active. Reset fault first."
          else:
            - switch.turn_off: relay_closed_valve2
            - delay: 20ms
            - switch.turn_on: relay_open_valve2
            - delay: 15ms
            - switch.turn_off: relay_open_valve2
            - delay: 15000ms
            - if:
                condition:
                  binary_sensor.is_off: open_end_stop_valve2
                then:
                  - lambda: |-
                      id(fault_irrigation) = true;
                      id(fault_reason_irr_str) = "Motor fault — open end stop not reached";
                      id(fault_reason_irr).publish_state(id(fault_reason_irr_str));
                      ESP_LOGE("valve", "IRRIGATION: open end stop not reached after 15000ms — motor/wiring fault");
                  - valve.template.publish:
                      id: irrigation_water_valve
                      state: CLOSED
    close_action:
      # See main valve close_action for explanation of the close-in-flight guard.
      - if:
          condition:
            lambda: 'return id(close_in_flight_irr);'
          then:
            - logger.log:
                level: DEBUG
                tag: valve
                format: "IRRIGATION: close already in flight — ignoring duplicate request"
          else:
            - lambda: 'id(close_in_flight_irr) = true;'
            - switch.turn_off: relay_open_valve2
            - delay: 20ms
            - switch.turn_on: relay_closed_valve2
            - delay: 15ms
            - switch.turn_off: relay_closed_valve2
            - delay: 15000ms
            - if:
                condition:
                  binary_sensor.is_off: closed_end_stop_valve2
                then:
                  - lambda: |-
                      id(fault_irrigation) = true;
                      id(fault_reason_irr_str) = "Motor fault — closed end stop not reached";
                      id(fault_reason_irr).publish_state(id(fault_reason_irr_str));
                      ESP_LOGE("valve", "IRRIGATION: closed end stop not reached after 15000ms — motor/wiring fault");